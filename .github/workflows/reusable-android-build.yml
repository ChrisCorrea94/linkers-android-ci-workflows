name: Reusable · Android Build

on:
  workflow_call:
    inputs:
      module:
        description: "Nombre del módulo Gradle a compilar (ej: network, app)"
        required: true
        type: string
      run-lint:
        description: "Ejecutar lint además del build"
        required: false
        type: boolean
        default: false
      run-tests:
        description: "Ejecutar unit tests del módulo"
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Android Build (${{ inputs.module }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble Debug
        run: ./gradlew :${{ inputs.module }}:assembleDebug

      - name: Unit Tests
        if: inputs.run-tests
        run: ./gradlew :${{ inputs.module }}:test

      - name: Upload test results
        if: inputs.run-tests && failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.module }}
          path: ${{ inputs.module }}/build/reports/tests/

      - name: Lint
        if: inputs.run-lint
        run: ./gradlew :${{ inputs.module }}:lint
