name: Reusable · Android Publish

on:
  workflow_call:
    inputs:
      module:
        description: "Módulo Gradle a publicar (ej: network)"
        required: true
        type: string
      version:
        description: "Versión a publicar — con o sin prefijo v (ej: v0.10.2 o 0.10.2). La v se elimina automáticamente."
        required: true
        type: string
      registry_url:
        description: "URL del repositorio Maven donde se publicará"
        required: true
        type: string
    secrets:
      PUBLISH_TOKEN:
        description: "Token con permisos write:packages para publicar en GitHub Packages"
        required: true

jobs:
  publish:
    name: Publish :${{ inputs.module }} (${{ inputs.version }})
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Compute version without v prefix
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          echo "value=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Publish to GitHub Packages
        run: ./gradlew :${{ inputs.module }}:publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
